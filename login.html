<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuthFlow — Secure Login & Signup</title>

    <!-- ============================================================
    FIREBASE CONFIGURATION
    ⚠️  SECURITY WARNING: The API keys and credentials below are
        now publicly exposed in this repository. For production,
        restrict Firebase API keys to authorized domains and use
        Firebase App Check + Secret Manager for sensitive keys.
    ============================================================ -->
    <!-- Firebase App (v10+ modular SDK via CDN) -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js"
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />

    <!-- Font Awesome 6 (Free) for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <style>
        /* ============================================================
                   CSS CUSTOM PROPERTIES — DARK & LIGHT THEMES
                   ============================================================ */
        :root {
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --transition-speed: 0.35s;
            --radius: 16px;
            --radius-sm: 10px;
        }

        [data-theme="dark"] {
            --bg-gradient-1: #0b0d1a;
            --bg-gradient-2: #141729;
            --bg-gradient-3: #1a1e35;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.10);
            --glass-shadow: rgba(0, 0, 0, 0.4);
            --text-primary: #f0f2ff;
            --text-secondary: #9ca3cf;
            --text-muted: #6b7280;
            --accent: #6c63ff;
            --accent-hover: #7f78ff;
            --accent-glow: rgba(108, 99, 255, 0.35);
            --input-bg: rgba(255, 255, 255, 0.06);
            --input-border: rgba(255, 255, 255, 0.10);
            --input-focus: rgba(108, 99, 255, 0.5);
            --social-bg: rgba(255, 255, 255, 0.07);
            --social-hover: rgba(255, 255, 255, 0.13);
            --toast-success: #10b981;
            --toast-error: #ef4444;
            --toast-bg: rgba(15, 18, 35, 0.92);
            --toggle-bg: rgba(255, 255, 255, 0.12);
        }

        [data-theme="light"] {
            --bg-gradient-1: #eef1ff;
            --bg-gradient-2: #e2e7ff;
            --bg-gradient-3: #d5dbff;
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.40);
            --glass-shadow: rgba(108, 99, 255, 0.10);
            --text-primary: #1a1e35;
            --text-secondary: #4a4f6a;
            --text-muted: #888ca8;
            --accent: #5850e6;
            --accent-hover: #4a42d4;
            --accent-glow: rgba(88, 80, 230, 0.25);
            --input-bg: rgba(255, 255, 255, 0.50);
            --input-border: rgba(0, 0, 0, 0.08);
            --input-focus: rgba(88, 80, 230, 0.30);
            --social-bg: rgba(255, 255, 255, 0.50);
            --social-hover: rgba(255, 255, 255, 0.75);
            --toast-success: #059669;
            --toast-error: #dc2626;
            --toast-bg: rgba(255, 255, 255, 0.92);
            --toggle-bg: rgba(0, 0, 0, 0.08);
        }

        /* ============================================================
                   RESET & BASE
                   ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
            padding: 20px;
            transition: background var(--transition-speed) ease;
        }

        /* ============================================================
                   ANIMATED BACKGROUND PARTICLES (CSS-only)
                   ============================================================ */
        .bg-particles {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .bg-particles span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.06;
            animation: float-particle 18s infinite ease-in-out;
        }

        .bg-particles span:nth-child(1) {
            top: 10%;
            left: 20%;
            width: 60px;
            height: 60px;
            animation-delay: 0s;
            animation-duration: 22s;
        }
        .bg-particles span:nth-child(2) {
            top: 70%;
            left: 85%;
            width: 40px;
            height: 40px;
            animation-delay: -3s;
            animation-duration: 20s;
        }
        .bg-particles span:nth-child(3) {
            top: 40%;
            left: 10%;
            width: 80px;
            height: 80px;
            animation-delay: -7s;
            animation-duration: 26s;
        }
        .bg-particles span:nth-child(4) {
            top: 85%;
            left: 30%;
            width: 30px;
            height: 30px;
            animation-delay: -5s;
            animation-duration: 19s;
        }
        .bg-particles span:nth-child(5) {
            top: 15%;
            left: 75%;
            width: 50px;
            height: 50px;
            animation-delay: -11s;
            animation-duration: 24s;
        }
        .bg-particles span:nth-child(6) {
            top: 55%;
            left: 55%;
            width: 100px;
            height: 100px;
            animation-delay: -2s;
            animation-duration: 30s;
        }

        @keyframes float-particle {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.06;
            }
            25% {
                transform: translate(30px, -40px) scale(1.2);
                opacity: 0.10;
            }
            50% {
                transform: translate(-20px, 20px) scale(0.8);
                opacity: 0.05;
            }
            75% {
                transform: translate(40px, 30px) scale(1.1);
                opacity: 0.09;
            }
        }

        /* ============================================================
                   MAIN CONTAINER (Glassmorphism Card)
                   ============================================================ */
        .auth-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-wrap: wrap;
            align-items: stretch;
            justify-content: center;
            gap: 0;
            max-width: 960px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow:
                0 25px 60px var(--glass-shadow),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            overflow: hidden;
            transition: background var(--transition-speed) ease, border var(--transition-speed) ease;
        }

        /* ============================================================
                   3D CHARACTER PANEL (Left Side)
                   ============================================================ */
        .character-panel {
            flex: 1 1 380px;
            min-height: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
            background: radial-gradient(ellipse at 50% 100%, var(--accent-glow), transparent 70%);
            position: relative;
            overflow: hidden;
        }

        .character-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 30% 40%, var(--accent) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, var(--accent) 0%, transparent 50%);
            opacity: 0.04;
            animation: shift-glow 8s ease-in-out infinite alternate;
        }

        @keyframes shift-glow {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(20px, -15px);
            }
        }

        .character-wrapper {
            position: relative;
            z-index: 2;
            width: 220px;
            height: 260px;
            perspective: 800px;
        }

        /* 3D Scene */
        .scene-3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: float-3d 6s ease-in-out infinite;
        }

        @keyframes float-3d {
            0%,
            100% {
                transform: translateY(0) rotateX(-2deg) rotateY(0deg);
            }
            25% {
                transform: translateY(-12px) rotateX(0deg) rotateY(4deg);
            }
            50% {
                transform: translateY(-4px) rotateX(2deg) rotateY(0deg);
            }
            75% {
                transform: translateY(-10px) rotateX(0deg) rotateY(-4deg);
            }
        }

        /* Character Body (layered shapes forming a modern tech character) */
        .character {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        .char-head {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 90px;
            background: linear-gradient(145deg, var(--accent), #8b83ff);
            border-radius: 50% 50% 45% 45%;
            box-shadow:
                0 8px 30px var(--accent-glow),
                inset 0 -10px 20px rgba(0, 0, 0, 0.15);
            animation: pulse-glow 3s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        .char-head::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 28px;
            height: 12px;
            background: var(--bg-gradient-1);
            border-radius: 10px;
            opacity: 0.7;
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .char-head::after {
            content: '';
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 4px;
            background: var(--bg-gradient-1);
            border-radius: 4px;
            opacity: 0.5;
        }

        @keyframes pulse-glow {
            0%,
            100% {
                box-shadow: 0 8px 30px var(--accent-glow), inset 0 -10px 20px rgba(0, 0, 0, 0.15);
            }
            50% {
                box-shadow: 0 8px 50px var(--accent-glow), inset 0 -10px 25px rgba(0, 0, 0, 0.15);
            }
        }

        .char-torso {
            position: absolute;
            top: 75px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100px;
            background: linear-gradient(170deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.03));
            border: 1.5px solid var(--glass-border);
            border-radius: 30px 30px 20px 20px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .char-torso::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 25px;
            border-radius: 12px;
            background: var(--accent);
            opacity: 0.3;
            filter: blur(3px);
            animation: core-pulse 2s ease-in-out infinite;
        }

        @keyframes core-pulse {
            0%,
            100% {
                opacity: 0.2;
                transform: translateX(-50%) scale(1);
            }
            50% {
                opacity: 0.5;
                transform: translateX(-50%) scale(1.1);
            }
        }

        .char-arm-l,
        .char-arm-r {
            position: absolute;
            top: 80px;
            width: 16px;
            height: 70px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            backdrop-filter: blur(4px);
        }

        .char-arm-l {
            left: -8px;
            transform: rotate(12deg);
            transform-origin: top center;
            animation: wave-arm 4s ease-in-out infinite;
        }

        .char-arm-r {
            right: -8px;
            transform: rotate(-8deg);
            transform-origin: top center;
            animation: wave-arm 4s ease-in-out infinite reverse;
        }

        @keyframes wave-arm {
            0%,
            100% {
                transform: rotate(12deg);
            }
            50% {
                transform: rotate(5deg);
            }
        }

        .char-leg-l,
        .char-leg-r {
            position: absolute;
            top: 160px;
            width: 18px;
            height: 60px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            backdrop-filter: blur(4px);
        }

        .char-leg-l {
            left: 18px;
            transform: rotate(-3deg);
        }

        .char-leg-r {
            right: 18px;
            transform: rotate(3deg);
        }

        /* Floating orbit rings around character */
        .orbit-ring {
            position: absolute;
            border: 1.5px solid var(--accent);
            border-radius: 50%;
            opacity: 0.15;
            animation: spin-orbit 12s linear infinite;
            transform-style: preserve-3d;
        }

        .orbit-ring:nth-child(1) {
            width: 260px;
            height: 100px;
            top: 70px;
            left: -20px;
            animation-duration: 14s;
            animation-direction: reverse;
        }

        .orbit-ring:nth-child(2) {
            width: 200px;
            height: 200px;
            top: 20px;
            left: 10px;
            animation-duration: 20s;
            border-color: var(--text-secondary);
            opacity: 0.08;
        }

        @keyframes spin-orbit {
            0% {
                transform: rotateX(60deg) rotateZ(0deg);
            }
            100% {
                transform: rotateX(60deg) rotateZ(360deg);
            }
        }

        /* Character panel text */
        .char-tagline {
            position: relative;
            z-index: 2;
            margin-top: 20px;
            text-align: center;
        }

        .char-tagline h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .char-tagline p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Theme toggle button (positioned inside character panel) */
        .theme-toggle {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 10;
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: var(--toggle-bg);
            backdrop-filter: blur(8px);
            color: var(--text-primary);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition-speed) ease, transform var(--transition-speed) ease;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            background: var(--social-hover);
        }

        /* ============================================================
                   FORM PANEL (Right Side)
                   ============================================================ */
        .form-panel {
            flex: 1 1 420px;
            padding: 40px 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 520px;
            transition: padding var(--transition-speed) ease;
        }

        .form-header {
            margin-bottom: 28px;
        }

        .form-header h1 {
            font-size: 1.85rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.75px;
        }

        .form-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .form-header p a {
            color: var(--accent);
            cursor: pointer;
            font-weight: 600;
            transition: color var(--transition-speed) ease;
        }

        .form-header p a:hover {
            color: var(--accent-hover);
        }

        /* Tab switcher (Login / Sign Up) */
        .tab-switcher {
            display: flex;
            gap: 4px;
            background: var(--input-bg);
            border-radius: var(--radius-sm);
            padding: 4px;
            margin-bottom: 24px;
            border: 1px solid var(--input-border);
        }

        .tab-switcher button {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            font-family: var(--font);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-speed) ease;
        }

        .tab-switcher button.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 14px var(--accent-glow);
        }

        .tab-switcher button:not(.active):hover {
            color: var(--text-primary);
            background: var(--social-hover);
        }

        /* ============================================================
                   FORM ELEMENTS
                   ============================================================ */
        .auth-form {
            display: block;
            width: 100%;
        }

        .auth-form.hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 16px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper .input-icon {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 0.9rem;
            pointer-events: none;
            transition: color var(--transition-speed) ease;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background: var(--input-bg);
            border: 1.5px solid var(--input-border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 0.9rem;
            outline: none;
            transition: all var(--transition-speed) ease;
        }

        .input-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--input-focus);
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .input-wrapper .toggle-pw {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px;
            transition: color var(--transition-speed) ease;
        }

        .input-wrapper .toggle-pw:hover {
            color: var(--text-primary);
        }

        /* Remember Me + Forgot Password row */
        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
            border-radius: 4px;
        }

        .forgot-link {
            color: var(--accent);
            font-weight: 600;
            cursor: pointer;
            background: none;
            border: none;
            font-family: var(--font);
            font-size: 0.85rem;
            transition: color var(--transition-speed) ease;
        }

        .forgot-link:hover {
            color: var(--accent-hover);
        }

        /* Submit Button */
        .btn-primary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: #fff;
            font-family: var(--font);
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition-speed) ease;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px var(--accent-glow);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading spinner inside button */
        .btn-spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        .btn-primary.loading .btn-spinner {
            display: inline-block;
        }

        .btn-primary.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 22px 0 18px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--input-border);
        }

        /* Social Login Buttons */
        .social-btns {
            display: flex;
            gap: 12px;
        }

        .social-btns button {
            flex: 1;
            padding: 11px;
            border: 1px solid var(--input-border);
            border-radius: var(--radius-sm);
            background: var(--social-bg);
            backdrop-filter: blur(4px);
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all var(--transition-speed) ease;
        }

        .social-btns button:hover {
            background: var(--social-hover);
            transform: translateY(-1px);
            border-color: var(--accent);
        }

        .social-btns button i {
            font-size: 1.1rem;
        }

        .btn-google {
            color: #ea4335;
        }
        .btn-facebook {
            color: #1877f2;
        }
        .btn-github {
            color: var(--text-primary);
        }

        /* ============================================================
                   TOAST NOTIFICATIONS
                   ============================================================ */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 360px;
        }

        .toast {
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            background: var(--toast-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
            color: var(--text-primary);
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: toast-in 0.4s ease forwards;
            transform-origin: top right;
        }

        .toast.removing {
            animation: toast-out 0.35s ease forwards;
        }

        .toast .toast-icon {
            font-size: 1.1rem;
        }

        .toast.success .toast-icon {
            color: var(--toast-success);
        }
        .toast.error .toast-icon {
            color: var(--toast-error);
        }

        @keyframes toast-in {
            0% {
                opacity: 0;
                transform: translateX(40px) scale(0.9);
            }
            100% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        @keyframes toast-out {
            0% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateX(40px) scale(0.9);
            }
        }

        /* ============================================================
                   RESPONSIVE
                   ============================================================ */
        @media (max-width: 820px) {
            .auth-container {
                flex-direction: column;
                max-width: 500px;
            }

            .character-panel {
                flex: none;
                min-height: 220px;
                padding: 24px 20px 16px;
            }

            .character-wrapper {
                width: 140px;
                height: 170px;
            }

            .char-head {
                width: 60px;
                height: 66px;
            }
            .char-torso {
                width: 72px;
                height: 72px;
                top: 52px;
            }
            .char-arm-l,
            .char-arm-r {
                width: 12px;
                height: 50px;
                top: 56px;
            }
            .char-arm-l {
                left: -6px;
            }
            .char-arm-r {
                right: -6px;
            }
            .char-leg-l,
            .char-leg-r {
                width: 14px;
                height: 44px;
                top: 112px;
            }
            .char-leg-l {
                left: 10px;
            }
            .char-leg-r {
                right: 10px;
            }
            .orbit-ring:nth-child(1) {
                width: 180px;
                height: 80px;
                left: -20px;
                top: 40px;
            }
            .orbit-ring:nth-child(2) {
                width: 140px;
                height: 140px;
                left: 0;
                top: 15px;
            }

            .char-tagline h2 {
                font-size: 1.1rem;
            }
            .char-tagline p {
                font-size: 0.75rem;
            }

            .form-panel {
                padding: 28px 24px;
                min-height: auto;
            }

            .form-header h1 {
                font-size: 1.5rem;
            }

            .theme-toggle {
                top: 12px;
                right: 12px;
                width: 36px;
                height: 36px;
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            .form-panel {
                padding: 20px 16px;
            }

            .social-btns {
                flex-direction: column;
            }

            .form-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
        }
    </style>
</head>

<body>

    <!-- ============================================================
    ANIMATED BACKGROUND PARTICLES
    ============================================================ -->
    <div class="bg-particles" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- ============================================================
    TOAST CONTAINER
    ============================================================ -->
    <div class="toast-container" id="toastContainer" role="status" aria-live="polite"></div>

    <!-- ============================================================
    MAIN AUTH CONTAINER
    ============================================================ -->
    <main class="auth-container" role="main">

        <!-- ===== LEFT: 3D CHARACTER PANEL ===== -->
        <section class="character-panel" aria-label="Animated 3D character illustration">

            <!-- Theme Toggle -->
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>

            <!-- 3D Character Scene -->
            <div class="character-wrapper">
                <div class="scene-3d">
                    <div class="character">
                        <!-- Floating orbit rings -->
                        <div class="orbit-ring"></div>
                        <div class="orbit-ring"></div>

                        <!-- Character parts -->
                        <div class="char-head"></div>
                        <div class="char-torso"></div>
                        <div class="char-arm-l"></div>
                        <div class="char-arm-r"></div>
                        <div class="char-leg-l"></div>
                        <div class="char-leg-r"></div>
                    </div>
                </div>
            </div>

            <!-- Tagline -->
            <div class="char-tagline">
                <h2>AuthFlow</h2>
                <p>Secure • Modern • Effortless</p>
            </div>
        </section>

        <!-- ===== RIGHT: FORM PANEL ===== -->
        <section class="form-panel" aria-label="Authentication forms">

            <!-- Tab Switcher -->
            <div class="tab-switcher" role="tablist">
                <button class="active" data-tab="login" role="tab" aria-selected="true" id="tabLogin">
                    <i class="fas fa-key"></i>&nbsp; Login
                </button>
                <button data-tab="signup" role="tab" aria-selected="false" id="tabSignup">
                    <i class="fas fa-user-plus"></i>&nbsp; Sign Up
                </button>
            </div>

            <!-- ===== LOGIN FORM ===== -->
            <form class="auth-form" id="loginForm" autocomplete="on" novalidate>
                <div class="form-header">
                    <h1>Welcome back</h1>
                    <p>Don't have an account? <a id="switchToSignup">Sign up free</a></p>
                </div>

                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password" />
                        <button type="button" class="toggle-pw" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-row">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe" />
                        Remember me
                    </label>
                    <button type="button" class="forgot-link" id="forgotPassword">Forgot password?</button>
                </div>

                <button type="submit" class="btn-primary" id="loginBtn">
                    <span class="btn-spinner"></span>
                    <span class="btn-text"><i class="fas fa-arrow-right-to-bracket"></i>&nbsp; Login</span>
                </button>

                <div class="divider">or continue with</div>

                <div class="social-btns">
                    <button type="button" class="btn-google" id="googleLogin">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="btn-facebook" id="facebookLogin">
                        <i class="fab fa-facebook-f"></i> Facebook
                    </button>
                    <button type="button" class="btn-github" id="githubLogin">
                        <i class="fab fa-github"></i> GitHub
                    </button>
                </div>
            </form>

            <!-- ===== SIGNUP FORM ===== -->
            <form class="auth-form hidden" id="signupForm" autocomplete="on" novalidate>
                <div class="form-header">
                    <h1>Create account</h1>
                    <p>Already registered? <a id="switchToLogin">Sign in</a></p>
                </div>

                <div class="form-group">
                    <label for="signupName">Full name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="signupName" placeholder="Jane Doe" required autocomplete="name" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="signupEmail" placeholder="you@example.com" required autocomplete="email" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="signupPassword" placeholder="At least 8 characters" required
                        minlength="8" autocomplete="new-password" />
                        <button type="button" class="toggle-pw" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupConfirm">Confirm password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-check-circle input-icon"></i>
                        <input type="password" id="signupConfirm" placeholder="Repeat your password" required
                        minlength="8" autocomplete="new-password" />
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="signupBtn">
                    <span class="btn-spinner"></span>
                    <span class="btn-text"><i class="fas fa-rocket"></i>&nbsp; Create Account</span>
                </button>

                <div class="divider">or sign up with</div>

                <div class="social-btns">
                    <button type="button" class="btn-google" id="googleSignup">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="btn-facebook" id="facebookSignup">
                        <i class="fab fa-facebook-f"></i> Facebook
                    </button>
                    <button type="button" class="btn-github" id="githubSignup">
                        <i class="fab fa-github"></i> GitHub
                    </button>
                </div>
            </form>

        </section>
    </main>

    <!-- ============================================================
    FIREBASE MODULAR SDK INITIALIZATION
    ============================================================ -->
    <script type="module">
        // -----------------------------------------------------------------
        // 🔥 Firebase v10+ modular SDK — import the functions we need
        // -----------------------------------------------------------------
        import { initializeApp } from 'firebase/app';
        import {
            getAuth,
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            signInWithPopup,
            GoogleAuthProvider,
            FacebookAuthProvider,
            GithubAuthProvider,
            sendPasswordResetEmail,
            onAuthStateChanged,
            setPersistence,
            browserLocalPersistence,
            browserSessionPersistence
        } from 'firebase/auth';

        // ================================================================
        // 🔧  FIREBASE CONFIG
        // ⚠️  These credentials are embedded for demo purposes.
        //      In production, restrict API key usage via Firebase Console
        //      (Authorized domains, App Check, etc.).
        // ================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDsl5QVJO6vr3ZEW58LJMT4evuMUN6VXbk",
            authDomain: "login-form-384bf.firebaseapp.com",
            projectId: "login-form-384bf",
            storageBucket: "login-form-384bf.firebasestorage.app",
            messagingSenderId: "749382037258",
            appId: "1:749382037258:android:e53d7a8f7004b76ab894f3"
        };

        // -----------------------------------------------------------------
        // Initialize Firebase
        // -----------------------------------------------------------------
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // -----------------------------------------------------------------
        // OAuth Providers
        // -----------------------------------------------------------------
        const googleProvider = new GoogleAuthProvider();
        const facebookProvider = new FacebookAuthProvider();
        const githubProvider = new GithubAuthProvider();

        // Facebook requires the Facebook Login SDK to be loaded separately
        // (see window.fbAsyncInit below). The Firebase Facebook provider
        // still works with the OAuth flow when configured in the console.

        // ================================================================
        // DOM REFERENCES
        // ================================================================
        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        const loginForm = $('#loginForm');
        const signupForm = $('#signupForm');
        const tabLogin = $('#tabLogin');
        const tabSignup = $('#tabSignup');
        const switchToSignup = $('#switchToSignup');
        const switchToLogin = $('#switchToLogin');

        const loginEmail = $('#loginEmail');
        const loginPassword = $('#loginPassword');
        const signupName = $('#signupName');
        const signupEmail = $('#signupEmail');
        const signupPassword = $('#signupPassword');
        const signupConfirm = $('#signupConfirm');
        const rememberMe = $('#rememberMe');

        const loginBtn = $('#loginBtn');
        const signupBtn = $('#signupBtn');
        const forgotBtn = $('#forgotPassword');

        const googleLogin = $('#googleLogin');
        const facebookLogin = $('#facebookLogin');
        const githubLogin = $('#githubLogin');
        const googleSignup = $('#googleSignup');
        const facebookSignup = $('#facebookSignup');
        const githubSignup = $('#githubSignup');

        const themeToggle = $('#themeToggle');
        const themeIcon = $('#themeIcon');
        const toastContainer = $('#toastContainer');

        // ================================================================
        // TOAST NOTIFICATION SYSTEM
        // ================================================================
        function showToast(message, type = 'success', duration = 4500) {
            const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-xmark';
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas ${icon} toast-icon"></i><span>${message}</span>`;
            toastContainer.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('removing');
                setTimeout(() => toast.remove(), 380);
            }, duration);
        }

        // ================================================================
        // THEME TOGGLE (Dark / Light)
        // ================================================================
        function getPreferredTheme() {
            const stored = localStorage.getItem('authflow-theme');
            if (stored) return stored;
            return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('authflow-theme', theme);
            themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        }

        // Initialize theme
        setTheme(getPreferredTheme());

        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        });

        // ================================================================
        // TAB SWITCHING (Login / Sign Up)
        // ================================================================
        function switchTab(tab) {
            const isLogin = tab === 'login';
            loginForm.classList.toggle('hidden', !isLogin);
            signupForm.classList.toggle('hidden', isLogin);
            tabLogin.classList.toggle('active', isLogin);
            tabSignup.classList.toggle('active', !isLogin);
            tabLogin.setAttribute('aria-selected', isLogin);
            tabSignup.setAttribute('aria-selected', !isLogin);
        }

        tabLogin.addEventListener('click', () => switchTab('login'));
        tabSignup.addEventListener('click', () => switchTab('signup'));
        switchToSignup.addEventListener('click', (e) => { e.preventDefault();
            switchTab('signup'); });
        switchToLogin.addEventListener('click', (e) => { e.preventDefault();
            switchTab('login'); });

        // ================================================================
        // PASSWORD VISIBILITY TOGGLE
        // ================================================================
        $$('.toggle-pw').forEach((btn) => {
            btn.addEventListener('click', () => {
                const input = btn.closest('.input-wrapper').querySelector('input');
                const icon = btn.querySelector('i');
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
                icon.className = isPassword ? 'fas fa-eye-slash' : 'fas fa-eye';
            });
        });

        // ================================================================
        // BUTTON LOADING STATE
        // ================================================================
        function setLoading(btn, loading) {
            btn.classList.toggle('loading', loading);
            btn.disabled = loading;
        }

        // ================================================================
        // 🔐  EMAIL & PASSWORD SIGN UP
        // ================================================================
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = signupName.value.trim();
            const email = signupEmail.value.trim();
            const password = signupPassword.value;
            const confirm = signupConfirm.value;

            // Basic client-side validation
            if (!name) {
                showToast('Please enter your full name.', 'error');
                return;
            }
            if (password.length < 8) {
                showToast('Password must be at least 8 characters.', 'error');
                return;
            }
            if (password !== confirm) {
                showToast('Passwords do not match.', 'error');
                return;
            }

            setLoading(signupBtn, true);

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Optional: update display name (Firebase Auth profile)
                // Requires updateProfile which is imported separately if needed.
                // For brevity we skip updating the profile here.

                showToast(`Account created! Welcome${name ? ', ' + name : ''}! 🎉`, 'success');

                // Redirect to dashboard after short delay
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1200);

            } catch (err) {
                const msg = firebaseErrorMessage(err.code);
                showToast(msg, 'error');
            } finally {
                setLoading(signupBtn, false);
            }
        });

        // ================================================================
        // 🔐  EMAIL & PASSWORD LOGIN
        // ================================================================
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = loginEmail.value.trim();
            const password = loginPassword.value;

            if (!email || !password) {
                showToast('Please fill in all fields.', 'error');
                return;
            }

            setLoading(loginBtn, true);

            try {
                // Set persistence based on "Remember me"
                const persistenceType = rememberMe.checked ?
                    browserLocalPersistence :
                    browserSessionPersistence;
                await setPersistence(auth, persistenceType);

                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                showToast('Login successful! Redirecting... 🚀', 'success');

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1200);

            } catch (err) {
                const msg = firebaseErrorMessage(err.code);
                showToast(msg, 'error');
            } finally {
                setLoading(loginBtn, false);
            }
        });

        // ================================================================
        // 🔐  PASSWORD RESET (with EmailJS-like public key approach)
        // ================================================================
        forgotBtn.addEventListener('click', async () => {
            const email = loginEmail.value.trim() || signupEmail.value.trim();

            if (!email) {
                showToast('Please enter your email address first.', 'error');
                return;
            }

            // Basic email format check
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showToast('Please enter a valid email address.', 'error');
                return;
            }

            forgotBtn.disabled = true;
            const originalText = forgotBtn.textContent;
            forgotBtn.textContent = 'Sending...';

            try {
                await sendPasswordResetEmail(auth, email);
                showToast(
                    `Password reset link sent to ${email}. Check your spam folder if you don't see it.`,
                    'success',
                    6000
                );
            } catch (err) {
                const msg = firebaseErrorMessage(err.code);
                showToast(msg, 'error');
            } finally {
                forgotBtn.disabled = false;
                forgotBtn.textContent = originalText;
            }
        });

        // ================================================================
        // 🔐  SOCIAL LOGIN — GOOGLE
        // ================================================================
        async function handleGoogleLogin() {
            setLoading(loginBtn, true);
            try {
                const result = await signInWithPopup(auth, googleProvider);
                showToast(`Welcome${result.user.displayName ? ', ' + result.user.displayName : ''}! 🚀`, 'success');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
            } catch (err) {
                const msg = firebaseErrorMessage(err.code);
                showToast(msg, 'error');
            } finally {
                setLoading(loginBtn, false);
            }
        }

        googleLogin.addEventListener('click', handleGoogleLogin);
        googleSignup.addEventListener('click', handleGoogleLogin);

        // ================================================================
        // 🔐  SOCIAL LOGIN — FACEBOOK
        // ================================================================
        async function handleFacebookLogin() {
            setLoading(loginBtn, true);
            try {
                const result = await signInWithPopup(auth, facebookProvider);
                showToast(`Welcome${result.user.displayName ? ', ' + result.user.displayName : ''}! 🚀`, 'success');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
            } catch (err) {
                const msg = firebaseErrorMessage(err.code);
                showToast(msg, 'error');
            } finally {
                setLoading(loginBtn, false);
            }
        }

        facebookLogin.addEventListener('click', handleFacebookLogin);
        facebookSignup.addEventListener('click', handleFacebookLogin);

        // ================================================================
        // 🔐  SOCIAL LOGIN — GITHUB
        // ================================================================
        async function handleGithubLogin() {
            setLoading(loginBtn, true);
            try {
                const result = await signInWithPopup(auth, githubProvider);
                showToast(`Welcome${result.user.displayName ? ', ' + result.user.displayName : ''}! 🚀`, 'success');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
            } catch (err) {
                const msg = firebaseErrorMessage(err.code);
                showToast(msg, 'error');
            } finally {
                setLoading(loginBtn, false);
            }
        }

        githubLogin.addEventListener('click', handleGithubLogin);
        githubSignup.addEventListener('click', handleGithubLogin);

        // ================================================================
        // 🧠  FIREBASE ERROR CODE → HUMAN-READABLE MESSAGE
        // ================================================================
        function firebaseErrorMessage(code) {
            const map = {
                'auth/user-not-found': 'No account found with this email.',
                'auth/wrong-password': 'Incorrect password. Try again.',
                'auth/invalid-credential': 'Invalid email or password.',
                'auth/user-disabled': 'This account has been disabled.',
                'auth/email-already-in-use': 'An account with this email already exists.',
                'auth/weak-password': 'Password must be at least 6 characters.',
                'auth/invalid-email': 'Please enter a valid email address.',
                'auth/operation-not-allowed': 'This sign-in method is not enabled. Contact support.',
                'auth/popup-closed-by-user': 'Sign-in popup was closed before completing.',
                'auth/popup-blocked': 'Popup was blocked. Please allow popups for this site.',
                'auth/network-request-failed': 'Network error. Check your connection.',
                'auth/too-many-requests': 'Too many attempts. Please try again later.',
                'auth/requires-recent-login': 'Please log in again before making this change.',
                'auth/account-exists-with-different-credential': 'An account already exists with the same email using a different sign-in method.',
            };
            return map[code] || `An error occurred (${code}). Please try again.`;
        }

        // ================================================================
        // 👁  AUTH STATE OBSERVER — redirect if already logged in
        // ================================================================
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Already authenticated — optionally redirect
                // We check sessionStorage to avoid redirect loops
                if (!sessionStorage.getItem('redirected')) {
                    sessionStorage.setItem('redirected', '1');
                    // Uncomment below to auto-redirect if already logged in:
                    // window.location.href = 'dashboard.html';
                }
            } else {
                sessionStorage.removeItem('redirected');
            }
        });

        // ================================================================
        // FB SDK INIT — needed for Facebook Login in browser
        // The Firebase Facebook provider works via OAuth redirect/popup
        // even without the FB SDK, but for completeness we load it.
        // ================================================================
        window.fbAsyncInit = function() {
            FB.init({
                appId: '27256137570717331',
                autoLogAppEvents: true,
                xfbml: true,
                version: 'v18.0'
            });
        };

        // Load Facebook SDK asynchronously
        (function(d, s, id) {
            const fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) return;
            const js = d.createElement(s);
            js.id = id;
            js.src = 'https://connect.facebook.net/en_US/sdk.js';
            fjs.parentNode.insertBefore(js, fjs);
        })(document, 'script', 'facebook-jssdk');

        // ================================================================
        // KEYBOARD SHORTCUT: Escape clears toasts
        // ================================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                toastContainer.innerHTML = '';
            }
        });

        // Log startup
        console.log('%c🔐 AuthFlow initialized', 'color: #6c63ff; font-size: 14px; font-weight: bold;');
        console.log(`🔥 Firebase project: ${firebaseConfig.projectId}`);
    </script>

</body>
  </html>
