<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monkey - Authentication</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #FF6B00;
      --primary-dark: #CC5500;
      --primary-light: #FF8533;
      --bg: #0D0D0D;
      --bg-card: #151515;
      --text: #FFFFFF;
      --text-secondary: #B0B0B0;
      --text-muted: rgba(255,255,255,0.35);
      --border: rgba(255,255,255,0.06);
      --border-input: rgba(255,255,255,0.08);
      --input-bg: rgba(255,255,255,0.04);
      --shadow: 0 25px 60px rgba(0,0,0,0.6);
      --glow: rgba(255,107,0,0.08);
      --success: #22c55e;
      --error: #ef4444;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .hidden { display: none !important; }

    /* ===== ANIMATED BACKGROUND ===== */
    .bg-animated {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      background: linear-gradient(-45deg, #0D0D0D 0%, #151515 25%, #1a0a00 50%, #0D0D0D 75%, #0a0500 100%);
      background-size: 400% 400%;
      animation: gradientShift 18s ease infinite;
      overflow: hidden;
    }

    .bg-animated::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,0,0.04) 0%, transparent 70%);
      top: -200px; right: -200px;
      animation: floatBlob 12s ease-in-out infinite;
    }

    .bg-animated::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,0,0.03) 0%, transparent 70%);
      bottom: -150px; left: -150px;
      animation: floatBlob 15s ease-in-out infinite reverse;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      25% { background-position: 100% 0%; }
      50% { background-position: 100% 100%; }
      75% { background-position: 0% 100%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes floatBlob {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(50px, -50px) scale(1.1); }
      66% { transform: translate(-30px, 30px) scale(0.9); }
    }

    /* ===== PARTICLES ===== */
    .particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px; height: 4px;
      background: rgba(255,107,0,0.2);
      border-radius: 50%;
      animation: floatParticle linear infinite;
    }

    @keyframes floatParticle {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    /* ===== GLASS ===== */
    .glass {
      background: rgba(21,21,21,0.85);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.06);
    }

    /* ===== APP ===== */
    #app {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      z-index: 1;
    }

    /* ===== PAGE ANIMATION ===== */
    .page {
      width: 100%;
      max-width: 440px;
      animation: pageEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .page-exit {
      animation: pageExit 0.35s cubic-bezier(0.55, 0, 0.1, 1) forwards;
    }

    @keyframes pageEntrance {
      0% { opacity: 0; transform: translateY(40px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes pageExit {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-30px) scale(0.95); }
    }

    /* ===== CARD ===== */
    .auth-card {
      background: rgba(21,21,21,0.85);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px;
      padding: 2.5rem 2.25rem;
      box-shadow: var(--shadow), 0 0 40px var(--glow);
      animation: cardPulse 4s ease-in-out infinite alternate;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      border-radius: 29px;
      background: linear-gradient(135deg, rgba(255,107,0,0.15), transparent 40%, transparent 60%, rgba(255,107,0,0.1));
      z-index: -1;
      animation: borderGlow 4s ease-in-out infinite alternate;
    }

    @keyframes cardPulse {
      0% { box-shadow: var(--shadow), 0 0 30px rgba(255,107,0,0.06); }
      100% { box-shadow: var(--shadow), 0 0 60px rgba(255,107,0,0.12); }
    }

    @keyframes borderGlow {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    .auth-card h1 {
      font-size: 1.7rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      animation: slideUp 0.5s ease 0.1s both;
    }

    .auth-card .subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 1.75rem;
      animation: slideUp 0.5s ease 0.15s both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== LOGO ===== */
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      animation: slideUp 0.5s ease 0.05s both;
    }

    .logo-icon {
      width: 50px; height: 50px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 8px 24px rgba(255,107,0,0.3);
      animation: logoBounce 2s ease-in-out infinite;
    }

    @keyframes logoBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .logo-text span { color: var(--primary); }

    /* ===== INPUTS ===== */
    .input-group { margin-bottom: 1.15rem; }

    .input-wrapper {
      display: flex;
      align-items: center;
      border-radius: 14px;
      border: 1px solid var(--border-input);
      background: var(--input-bg);
      transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
      position: relative;
    }

    .input-wrapper:focus-within {
      border-color: var(--primary);
      background: rgba(255,107,0,0.05);
      box-shadow: 0 0 0 4px rgba(255,107,0,0.08), 0 0 20px rgba(255,107,0,0.05);
      transform: translateY(-1px);
    }

    .input-wrapper.error { border-color: rgba(239,68,68,0.5); background: rgba(239,68,68,0.04); }
    .input-wrapper.success { border-color: rgba(34,197,94,0.5); background: rgba(34,197,94,0.04); }

    .input-icon {
      padding-left: 1.1rem;
      color: var(--text-muted);
      transition: color 0.3s ease, transform 0.3s ease;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .input-wrapper:focus-within .input-icon {
      color: var(--primary);
      transform: scale(1.05);
    }

    .input-icon svg { width: 18px; height: 18px; }

    .floating-wrap { position: relative; flex: 1; }

    .floating-wrap input {
      width: 100%;
      padding: 1.25rem 0.75rem 0.4rem;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
    }

    .floating-wrap label {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.9rem;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .floating-wrap input:focus + label,
    .floating-wrap input:not(:placeholder-shown) + label {
      top: 0.4rem;
      transform: translateY(0);
      font-size: 0.7rem;
      color: var(--primary);
    }

    .input-actions { display: flex; gap: 0.25rem; padding-right: 0.85rem; }

    .input-action-btn {
      background: none; border: none;
      color: var(--text-muted); cursor: pointer; padding: 0.3rem;
      display: flex; align-items: center;
      transition: color 0.2s, transform 0.2s;
    }

    .input-action-btn:hover { color: var(--text-secondary); transform: scale(1.1); }
    .input-action-btn svg { width: 18px; height: 18px; }

    .error-message {
      display: flex; align-items: center; gap: 0.3rem;
      margin-top: 0.4rem; padding-left: 0.25rem;
      font-size: 0.75rem; color: rgba(239,68,68,0.85);
      animation: shakeIn 0.35s ease;
    }

    .error-message svg { width: 14px; height: 14px; flex-shrink: 0; }

    @keyframes shakeIn {
      0% { opacity: 0; transform: translateX(-8px); }
      25% { transform: translateX(4px); }
      50% { transform: translateX(-2px); }
      75% { transform: translateX(1px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    /* ===== BUTTON ===== */
    .btn {
      position: relative; overflow: hidden;
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.9rem 1.5rem; border-radius: 14px;
      font-weight: 600; font-size: 0.9rem; font-family: inherit;
      border: none; cursor: pointer;
      transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
      width: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      box-shadow: 0 4px 20px rgba(255,107,0,0.3);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 8px 35px rgba(255,107,0,0.45);
    }

    .btn-primary:active:not(:disabled) { transform: translateY(-1px); }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border: 1px solid var(--border-input);
    }

    .btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.1); }

    /* Google button */
    .btn-google {
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.1);
      margin-top: 0.75rem;
    }

    .btn-google:hover:not(:disabled) {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,107,0,0.3);
      transform: translateY(-2px);
    }

    .btn-google svg { width: 20px; height: 20px; }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: scale(0);
      animation: rippleEffect 0.6s ease-out;
      pointer-events: none;
    }

    @keyframes rippleEffect {
      to { transform: scale(4); opacity: 0; }
    }

    .btn-spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== DIVIDER ===== */
    .divider {
      display: flex; align-items: center;
      gap: 1rem; margin: 1.25rem 0;
      animation: fadeIn 0.5s ease 0.3s both;
    }

    .divider-line {
      flex: 1; height: 1px;
      background: rgba(255,255,255,0.06);
    }

    .divider-text {
      color: var(--text-muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ===== LINK ===== */
    .auth-link {
      color: var(--primary); text-decoration: none;
      font-weight: 500; cursor: pointer;
      transition: color 0.2s;
    }

    .auth-link:hover { color: var(--primary-light); }

    .text-muted {
      color: var(--text-muted); font-size: 0.85rem;
      text-align: center; margin-top: 1.5rem;
      animation: fadeIn 0.5s ease 0.4s both;
    }

    /* ===== CHECKBOX ===== */
    .checkbox-wrap {
      display: flex; align-items: center; gap: 0.5rem;
      cursor: pointer; user-select: none;
    }

    .checkbox-wrap input { display: none; }

    .check-custom {
      width: 18px; height: 18px; border-radius: 5px;
      border: 1px solid var(--border-input);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s; flex-shrink: 0;
    }

    .checkbox-wrap:hover .check-custom { border-color: var(--text-muted); }
    .checkbox-wrap input:checked + .check-custom { background: var(--primary); border-color: var(--primary); animation: checkPop 0.3s ease; }

    @keyframes checkPop {
      0% { transform: scale(0.8); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .check-label {
      font-size: 0.85rem; color: var(--text-muted); transition: color 0.2s;
    }

    .checkbox-wrap:hover .check-label { color: var(--text-secondary); }

    /* ===== OTP ===== */
    .otp-container {
      display: flex; gap: 0.65rem; justify-content: center; margin: 1.5rem 0;
      animation: fadeIn 0.5s ease 0.2s both;
    }

    .otp-box {
      width: 3.25rem; height: 3.75rem;
      text-align: center; font-size: 1.5rem; font-weight: 700; font-family: inherit;
      border-radius: 14px; background: var(--input-bg);
      border: 1px solid var(--border-input); color: var(--text);
      transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
      outline: none;
    }

    .otp-box:focus {
      border-color: var(--primary);
      box-shadow: 0 0 25px rgba(255,107,0,0.15), 0 0 0 4px rgba(255,107,0,0.06);
      background: rgba(255,107,0,0.06);
      transform: translateY(-2px);
    }

    .otp-box.filled {
      border-color: var(--success);
      background: rgba(34,197,94,0.06);
      animation: otpFill 0.3s ease;
    }

    @keyframes otpFill {
      0% { transform: scale(0.9); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    /* ===== PASSWORD STRENGTH ===== */
    .strength-container { animation: slideUp 0.3s ease; margin-top: 0.5rem; }

    .strength-bars { display: flex; gap: 0.3rem; margin-bottom: 0.5rem; }

    .strength-bar {
      height: 4px; flex: 1; border-radius: 2px;
      background: rgba(255,255,255,0.06);
      transition: background 0.4s ease, transform 0.3s ease;
    }

    .strength-bar.active {
      background: var(--bar-color);
      transform: scaleY(1.2);
    }

    .strength-label { font-size: 0.75rem; font-weight: 500; margin-bottom: 0.5rem; }

    .requirements-list { display: flex; flex-direction: column; gap: 0.25rem; }

    .req-item {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.8rem; color: var(--text-muted);
      transition: color 0.3s, transform 0.3s;
    }

    .req-item.met { color: var(--success); }
    .req-item svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ===== COUNTDOWN ===== */
    .countdown-area { text-align: center; margin-bottom: 1.5rem; }
    .countdown-text { font-size: 0.85rem; color: var(--text-secondary); }
    .resend-btn {
      background: none; border: none;
      color: var(--primary); font-weight: 600; font-size: 0.85rem;
      font-family: inherit; cursor: pointer; transition: all 0.2s;
    }
    .resend-btn:disabled { color: var(--text-muted); cursor: not-allowed; }
    .resend-btn:hover:not(:disabled) { color: var(--primary-light); transform: scale(1.02); }

    /* ===== SUCCESS CHECKMARK ===== */
    .success-container {
      display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 1.5rem 0;
      animation: fadeIn 0.5s ease;
    }

    .check-circle {
      width: 80px; height: 80px; border-radius: 50%;
      border: 3px solid var(--success);
      display: flex; align-items: center; justify-content: center;
      animation: checkBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes checkBounce {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }

    .check-circle svg {
      width: 40px; height: 40px;
      stroke: var(--success); stroke-width: 3;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
      stroke-dasharray: 100; stroke-dashoffset: 100;
      animation: checkDraw 0.5s ease 0.25s forwards;
    }

    @keyframes checkDraw { to { stroke-dashoffset: 0; } }

    .success-title { font-size: 1.4rem; font-weight: 700; }
    .success-subtitle { color: var(--text-secondary); font-size: 0.9rem; text-align: center; }

    /* ===== TOAST ===== */
    .toast-container {
      position: fixed; top: 1.25rem; right: 1.25rem; z-index: 99999;
      display: flex; flex-direction: column; gap: 0.5rem;
      pointer-events: none;
    }

    .toast {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.85rem 1.1rem; border-radius: 14px;
      min-width: 300px; pointer-events: auto;
      animation: toastSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 10px 50px rgba(0,0,0,0.5);
      background: rgba(21,21,21,0.95);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .toast-exit { animation: toastExit 0.3s ease forwards; }

    @keyframes toastSlide {
      from { opacity: 0; transform: translateX(120px) scale(0.9); }
      to { opacity: 1; transform: translateX(0) scale(1); }
    }

    @keyframes toastExit {
      to { opacity: 0; transform: translateX(120px) scale(0.9); }
    }

    .toast.toast-success { border-color: rgba(34,197,94,0.3); }
    .toast.toast-error { border-color: rgba(239,68,68,0.3); }
    .toast.toast-warning { border-color: rgba(234,179,8,0.3); }
    .toast.toast-info { border-color: rgba(59,130,246,0.3); }

    .toast-icon { flex-shrink: 0; display: flex; }
    .toast-icon svg { width: 20px; height: 20px; }
    .toast-success .toast-icon svg { color: var(--success); }
    .toast-error .toast-icon svg { color: var(--error); }
    .toast-warning .toast-icon svg { color: #eab308; }
    .toast-info .toast-icon svg { color: #3b82f6; }

    .toast-msg { flex: 1; font-size: 0.85rem; color: var(--text); }
    .toast-close {
      background: none; border: none;
      color: var(--text-muted); cursor: pointer; padding: 0.2rem;
      display: flex; transition: color 0.2s, transform 0.2s;
    }
    .toast-close:hover { color: var(--text-secondary); transform: rotate(90deg); }
    .toast-close svg { width: 16px; height: 16px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      #app { padding: 0.75rem; }
      .auth-card { padding: 2rem 1.25rem; border-radius: 22px; }
      .auth-card h1 { font-size: 1.4rem; }
      .otp-box { width: 2.75rem; height: 3.25rem; font-size: 1.25rem; }
      .otp-container { gap: 0.5rem; }
      .toast { min-width: 260px; }
    }

    @media (max-width: 480px) {
      .auth-card { padding: 1.5rem 1rem; border-radius: 18px; }
      .otp-box { width: 2.5rem; height: 3rem; font-size: 1.1rem; }
      .otp-container { gap: 0.35rem; }
      .toast { min-width: 240px; }
      .logo-icon { width: 42px; height: 42px; font-size: 1.2rem; }
      .logo-text { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-animated"></div>
  <div class="particles" id="particles"></div>

  <div id="app"></div>
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // ============================================================
    //  PARTICLES
    // ============================================================
    (function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.width = (2 + Math.random() * 4) + 'px';
        p.style.height = p.style.width;
        p.style.animationDuration = (15 + Math.random() * 20) + 's';
        p.style.animationDelay = (Math.random() * 20) + 's';
        p.style.opacity = 0.1 + Math.random() * 0.3;
        container.appendChild(p);
      }
    })();

    // ============================================================
    //  ICONS
    // ============================================================
    const Icons = {
      mail: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/></svg>`,

      user: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
      eye: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
      eyeOff: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M14.12 14.12a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`,
      check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
      x: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
      alertCircle: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
      checkCircle: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
      google: `<svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>`,
      arrowLeft: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>`,
    };

    // ============================================================
    //  LOCAL DB
    // ============================================================
    const DB = {
      get(k) { try { return JSON.parse(localStorage.getItem('monkey_'+k)); } catch { return null; } },
      set(k,v) { localStorage.setItem('monkey_'+k, JSON.stringify(v)); },
      remove(k) { localStorage.removeItem('monkey_'+k); },
      get users() { return this.get('users')||[]; },
      set users(v) { this.set('users',v); },
      get otps() { return this.get('otps')||[]; },
      set otps(v) { this.set('otps',v); },
      get session() { return this.get('session'); },
      set session(v) { this.set('session',v); },
    };

    function genId() { return Date.now().toString(36)+Math.random().toString(36).substr(2,9); }
    function genOTP() { return Math.floor(100000+Math.random()*900000).toString(); }

    // ============================================================
    //  TOAST
    // ============================================================
    const Toast = {
      show(msg, type='info', duration=4000) {
        const c = document.getElementById('toastContainer');
        const icons = { success: Icons.checkCircle, error: Icons.alertCircle, warning: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`, info: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>` };
        const id = 't_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
        const el = document.createElement('div');
        el.className = `toast toast-${type}`; el.id = id;
        el.innerHTML = `<span class="toast-icon">${icons[type]}</span><span class="toast-msg">${msg}</span><button class="toast-close" onclick="Toast.dismiss('${id}')">${Icons.x}</button>`;
        c.appendChild(el);
        setTimeout(() => Toast.dismiss(id), duration);
      },
      dismiss(id) { const el=document.getElementById(id); if(!el) return; el.classList.add('toast-exit'); setTimeout(()=>el.remove(),300); }
    };

    // ============================================================
    //  VALIDATORS
    // ============================================================
    const V = {
      email(e) { if(!e||!e.trim()) return 'Email required'; if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)) return 'Invalid email'; return null; },
      password(p) { if(!p) return 'Password required'; if(p.length<8) return 'Min 8 characters'; return null; },
      confirmPassword(p,c) { if(!c) return 'Confirm password'; if(p!==c) return 'Passwords do not match'; return null; },
      name(n) { if(!n||!n.trim()) return 'Name required'; if(n.trim().length<2) return 'Min 2 characters'; return null; },
      strength(p) {
        let s=0; if(p.length>=8) s+=20; if(p.length>=12) s+=10; if(/[A-Z]/.test(p)) s+=15;
        if(/[a-z]/.test(p)) s+=15; if(/[0-9]/.test(p)) s+=15; if(/[!@#$%^&*(),.?":{}|<>]/.test(p)) s+=15; if(p.length>=16) s+=10;
        const l=s<30?'Weak':s<50?'Fair':s<70?'Good':s<90?'Strong':'Very Strong';
        const c=s<30?'#ef4444':s<50?'#f97316':s<70?'#eab308':s<90?'#22c55e':'#16a34a';
        return {score:s,label:l,color:c};
      },
      reqs: [
        {label:'8+ characters', test:p=>p.length>=8},
        {label:'Uppercase letter', test:p=>/[A-Z]/.test(p)},
        {label:'Lowercase letter', test:p=>/[a-z]/.test(p)},
        {label:'Number', test:p=>/[0-9]/.test(p)},
        {label:'Special character', test:p=>/[!@#$%^&*(),.?":{}|<>]/.test(p)},
      ],
    };

    // ============================================================
    //  STATE & ROUTER
    // ============================================================
    const state = {
      page: 'welcome', email: '', password: '', confirmPassword: '', fullName: '', rememberMe: false,
      showPwd: false, showConfirmPwd: false, otp: ['','','','','',''], otpError: null, countdown: 0, countdownInt: null,
      emailForReset: '', resetStage: 'email', otpVerified: false,
    };

    const app = document.getElementById('app');

    function navigate(page) {
      const current = document.querySelector('.page');
      if (current) {
        current.classList.add('page-exit');
        setTimeout(() => { render(page); }, 350);
      } else {
        render(page);
      }
    }

    function render(page) {
      state.page = page;
      app.innerHTML = '';
      const el = renderPage(page);
      if (el) app.appendChild(el);
    }

    // ============================================================
    //  PAGES
    // ============================================================

    // --- WELCOME ---
    function renderWelcome() {
      const d = document.createElement('div'); d.className = 'page';
      d.innerHTML = `
        <div class="auth-card" style="text-align:center;padding:3rem 2.5rem;">
          <div class="logo" style="justify-content:center;margin-bottom:1.5rem;">
            <div class="logo-icon">🐵</div>
            <div class="logo-text"><span>Monkey</span></div>
          </div>
          <h1 style="margin-bottom:0.5rem;">Welcome to Monkey</h1>
          <p class="subtitle">Secure, fast, and modern authentication</p>
          <div style="margin-bottom:2rem;padding:1.5rem;background:rgba(255,107,0,0.04);border-radius:16px;border:1px solid rgba(255,107,0,0.1);">
            <p style="font-size:0.9rem;color:var(--text-secondary);line-height:1.6;">Enterprise-grade security with a playful touch. Sign in or create your account to get started.</p>
          </div>
          <button class="btn btn-primary" onclick="navigate('login')" style="margin-bottom:0.75rem;">Sign In</button>
          <button class="btn btn-secondary" onclick="navigate('register')">Create Account</button>
        </div>
      `;
      return d;
    }

    // --- LOGIN ---
    function renderLogin() {
      state.showPwd = false;
      const d = document.createElement('div'); d.className = 'page';
      d.innerHTML = `
        <div class="auth-card">
          <div class="logo"><div class="logo-icon">🐵</div><div class="logo-text"><span>Monkey</span></div></div>
          <h1>Welcome Back</h1>
          <p class="subtitle">Sign in to your Monkey account</p>
          <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
              <div class="input-wrapper" id="loginEmailWrap">
                <span class="input-icon">${Icons.mail}</span>

              <div class="error-message hidden" id="loginEmailErr"></div>

              <a class="auth-link" onclick="event.preventDefault();navigate('forgot-password')" style="font-size:0.85rem;">Forgot password?</a>
            </div>

    window.toggleLoginPwd = function() {
      state.showPwd = !state.showPwd;
      const i = document.getElementById('loginPwd'), ic = document.getElementById('loginPwdIcon');
      if(i) i.type = state.showPwd ? 'text' : 'password';
      if(ic) ic.innerHTML = state.showPwd ? Icons.eyeOff : Icons.eye;
    };

    window.handleLogin = function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const pwd = document.getElementById('loginPwd').value;
      let bad = false;
      const ee = V.email(email), pe = V.password(pwd);
      const eel = document.getElementById('loginEmailErr'), pel = document.getElementById('loginPwdErr');
      const ewr = document.getElementById('loginEmailWrap'), pwr = document.getElementById('loginPwdWrap');
      if(ee) { eel.textContent=ee; eel.classList.remove('hidden'); ewr.classList.add('error'); bad=true; }
      else { eel.classList.add('hidden'); ewr.classList.remove('error'); }
      if(pe) { pel.textContent=pe; pel.classList.remove('hidden'); pwr.classList.add('error'); bad=true; }
      else { pel.classList.add('hidden'); pwr.classList.remove('error'); }
      if(bad) return;

      const btn=document.getElementById('loginBtn'), txt=document.getElementById('loginBtnText'), sp=document.getElementById('loginBtnSpin');
      btn.disabled=true; txt.classList.add('hidden'); sp.classList.remove('hidden');
      setTimeout(() => {
        const users=DB.users, u=users.find(u=>u.email===email);
        if(!u) { Toast.show('No account found with this email','error'); btn.disabled=false; txt.classList.remove('hidden'); sp.classList.add('hidden'); return; }
        if(u.password!==pwd) { Toast.show('Invalid email or password','error'); btn.disabled=false; txt.classList.remove('hidden'); sp.classList.add('hidden'); return; }
        if(!u.emailVerified) { Toast.show('Please verify your email first','warning'); btn.disabled=false; txt.classList.remove('hidden'); sp.classList.add('hidden'); state.email=email; navigate('verify-email'); return; }
        DB.session={uid:u.uid, email:u.email, fullName:u.fullName};
        Toast.show('Welcome back! 🐵','success');
        navigate('dashboard');
      }, 1200);
    };

    window.handleGoogleLogin = function() {
      const btn=document.getElementById('googleBtn'), txt=document.getElementById('googleBtnText'), sp=document.getElementById('googleBtnSpin'), ic=document.getElementById('googleIcon');
      btn.disabled=true; txt.classList.add('hidden'); sp.classList.remove('hidden'); if(ic) ic.classList.add('hidden');
      setTimeout(() => {
        // Simulate Google Auth
        const email = 'user.' + Math.random().toString(36).substr(2,5) + '@gmail.com';
        const users = DB.users;
        let u = users.find(u => u.email === email);
        if(!u) {
          const uid = genId();
          u = { uid, fullName: 'Google User', email, password: 'google_auth_'+uid, emailVerified: true, createdAt: new Date().toISOString(), lastLogin: new Date().toISOString(), role: 'user' };
          users.push(u); DB.users = users;
        }
        DB.session = { uid: u.uid, email: u.email, fullName: u.fullName };
        Toast.show('Signed in with Google! 🐵','success');
        navigate('dashboard');
      }, 1500);
    };

    // --- REGISTER ---
    function renderRegister() {
      state.showPwd = false; state.showConfirmPwd = false;
      const d = document.createElement('div'); d.className = 'page';
      d.innerHTML = `
        <div class="auth-card">
          <div class="logo"><div class="logo-icon">🐵</div><div class="logo-text"><span>Monkey</span></div></div>
          <h1>Join Monkey</h1>
          <p class="subtitle">Create your free account</p>
          <form id="regForm" onsubmit="handleRegister(event)">
            <div class="input-group">
              <div class="input-wrapper" id="regNameWrap"><span class="input-icon">${Icons.user}</span><div class="floating-wrap"><input type="text" id="regName" placeholder=" " autocomplete="name" value="${state.fullName}" /><label>Full Name</label></div></div>
              <div class="error-message hidden" id="regNameErr"></div>
            </div>
            <div class="input-group">
              <div class="input-wrapper" id="regEmailWrap"><span class="input-icon">${Icons.mail}</span><div class="floating-wrap"><input type="email" id="regEmail" placeholder=" " autocomplete="email" value="${state.email}" /><label>Email Address</label></div></div>
              <div class="error-message hidden" id="regEmailErr"></div>
            </div>
            <div class="input-group">
              <div class="input-wrapper" id="regPwdWrap">
                <span class="input-icon">${Icons.lock}</span>
                <div class="floating-wrap"><input type="password" id="regPwd" placeholder=" " autocomplete="new-password" value="${state.password}" oninput="onRegPwdChange()" /><label>Password</label></div>

              <div id="regStrength"></div>

              <div class="input-wrapper" id="regConfirmWrap">
                <span class="input-icon">${Icons.lock}</span>
                <div class="floating-wrap"><input type="password" id="regConfirm" placeholder=" " autocomplete="new-password" value="${state.confirmPassword}" /><label>Confirm Password</label></div>

          <p class="text-muted">Already have an account? <a class="auth-link" onclick="navigate('login')">Sign in</a></p>
        </div>
      `;
      if(state.password) setTimeout(()=>onRegPwdChange(),50);
      return d;
    }

    window.toggleRegPwd = function() {
      state.showPwd = !state.showPwd;
      const i=document.getElementById('regPwd'), ic=document.getElementById('regPwdIcon');
      if(i) i.type=state.showPwd?'text':'password';
      if(ic) ic.innerHTML=state.showPwd?Icons.eyeOff:Icons.eye;
    };

    window.toggleRegConfirm = function() {
      state.showConfirmPwd = !state.showConfirmPwd;
      const i=document.getElementById('regConfirm'), ic=document.getElementById('regConfirmIcon');
      if(i) i.type=state.showConfirmPwd?'text':'password';
      if(ic) ic.innerHTML=state.showConfirmPwd?Icons.eyeOff:Icons.eye;
    };

    window.onRegPwdChange = function() {
      const pwd=document.getElementById('regPwd').value; state.password=pwd;
      const c=document.getElementById('regStrength');
      if(!pwd) { c.innerHTML=''; return; }
      const s=V.strength(pwd);
      const bars=[1,2,3,4,5].map(l=>`<div class="strength-bar${s.score>=l*20?' active':''}" style="${s.score>=l*20?'--bar-color:'+s.color:''}"></div>`).join('');
      const reqs=V.reqs.map(r=>`<div class="req-item${r.test(pwd)?' met':''}">${r.test(pwd)?Icons.check:Icons.x} ${r.label}</div>`).join('');
      c.innerHTML=`<div class="strength-container"><div class="strength-bars">${bars}</div><p class="strength-label" style="color:${s.color}">${s.label}</p><div class="requirements-list">${reqs}</div></div>`;
    };

    window.handleRegister = function(e) {
      e.preventDefault();
      const n=document.getElementById('regName').value, em=document.getElementById('regEmail').value;
      const p=document.getElementById('regPwd').value, cf=document.getElementById('regConfirm').value;
      let bad=false;
      const ne=V.name(n), ee=V.email(em), pe=V.password(p), ce=V.confirmPassword(p,cf);
      const fields=[
        {id:'regName',err:ne,ei:'regNameErr',wi:'regNameWrap'},
        {id:'regEmail',err:ee,ei:'regEmailErr',wi:'regEmailWrap'},
        {id:'regPwd',err:pe,ei:'regPwdErr',wi:'regPwdWrap'},
        {id:'regConfirm',err:ce,ei:'regConfirmErr',wi:'regConfirmWrap'},
      ];
      fields.forEach(x=>{const el=document.getElementById(x.ei), wr=document.getElementById(x.wi); if(x.err){el.textContent=x.err;el.classList.remove('hidden');wr.classList.add('error');bad=true;}else{el.classList.add('hidden');wr.classList.remove('error');}});
      if(bad) return;

      const btn=document.getElementById('regBtn'), txt=document.getElementById('regBtnText'), sp=document.getElementById('regBtnSpin');
      btn.disabled=true; txt.classList.add('hidden'); sp.classList.remove('hidden');
      setTimeout(() => {
        const users=DB.users;
        if(users.find(u=>u.email===em)){Toast.show('Email already in use','error');btn.disabled=false;txt.classList.remove('hidden');sp.classList.add('hidden');return;}
        const uid=genId();
        users.push({uid,fullName:n.trim(),email:em,password:p,emailVerified:false,createdAt:new Date().toISOString(),lastLogin:null,role:'user'});
        DB.users=users;
        DB.session={uid,email:em,fullName:n.trim()};
        state.email=em; state.fullName=n.trim();
        Toast.show('Account created! 🐵 Check email to verify.','success',6000);
        navigate('verify-email');
      }, 1200);
    };

    window.handleGoogleRegister = function() {
      const btn=document.getElementById('googleRegBtn'), txt=document.getElementById('googleRegText'), sp=document.getElementById('googleRegSpin'), ic=document.getElementById('googleRegIcon');
      btn.disabled=true; txt.classList.add('hidden'); sp.classList.remove('hidden'); if(ic) ic.classList.add('hidden');
      setTimeout(() => {
        const email='user.'+Math.random().toString(36).substr(2,5)+'@gmail.com';
        const users=DB.users;
        if(!users.find(u=>u.email===email)){
          const uid=genId();
          users.push({uid,fullName:'Google User',email,password:'google_'+uid,emailVerified:true,createdAt:new Date().toISOString(),lastLogin:new Date().toISOString(),role:'user'});
          DB.users=users;
        }
        DB.session={uid:users.find(u=>u.email===email).uid,email,fullName:'Google User'};
        Toast.show('Signed up with Google! 🐵','success');
        navigate('dashboard');
      }, 1500);
    };
      // --- FORGOT PASSWORD ---
    function renderForgotPassword() {
      state.resetStage = 'email';
      const d = document.createElement('div'); d.className = 'page';
      d.innerHTML = `
        <div class="auth-card">
          <a class="auth-link" onclick="navigate('login')" style="display:inline-flex;align-items:center;gap:0.35rem;font-size:0.85rem;margin-bottom:1rem;">${Icons.arrowLeft} Back to login</a>

            <div class="input-group">
              <div class="input-wrapper" id="forgotEmailWrap"><span class="input-icon">${Icons.mail}</span><div class="floating-wrap"><input type="email" id="forgotEmail" placeholder=" " autocomplete="email" value="${state.emailForReset}" /><label>Email Address</label></div></div>
              <div class="error-message hidden" id="forgotEmailErr"></div>
            </div>
            <button type="submit" class="btn btn-primary" id="forgotBtn"><span id="forgotBtnText">Send OTP</span><span id="forgotBtnSpin" class="hidden"><span class="btn-spinner"></span> Sending...</span></button>
          </form>
        </div>
      `;
      return d;
    }

    window.handleForgot = function(e) {
      e.preventDefault();
      const em = document.getElementById('forgotEmail').value;
      const ee = V.email(em);
      const el = document.getElementById('forgotEmailErr'), wr = document.getElementById('forgotEmailWrap');
      if(ee) { el.textContent=ee; el.classList.remove('hidden'); wr.classList.add('error'); return; }
      el.classList.add('hidden'); wr.classList.remove('error');
      const btn=document.getElementById('forgotBtn'), txt=document.getElementById('forgotBtnText'), sp=document.getElementById('forgotBtnSpin');
      btn.disabled=true; txt.classList.add('hidden'); sp.classList.remove('hidden');
      setTimeout(() => {
        const otp=genOTP(); DB.otps=DB.otps.filter(o=>o.email!==em);
        DB.otps.push({email:em,otp,expiresAt:Date.now()+5*60*1000});
        state.emailForReset=em;
        console.log(`[DEV] OTP for ${em}: ${otp}`);
        Toast.show(`OTP sent${DB.users.find(u=>u.email===em)?'':' (if account exists)'}`,'success');
        navigate('verify-otp');
      }, 1200);
    };

    // --- VERIFY OTP ---
    function renderVerifyOTP() {
      state.otp=['','','','','','']; state.otpError=null; state.countdown=60;
      const d = document.createElement('div'); d.className = 'page';
      d.innerHTML = `
        <div class="auth-card">
          <a class="auth-link" onclick="navigate('forgot-password')" style="display:inline-flex;align-items:center;gap:0.35rem;font-size:0.85rem;margin-bottom:1rem;">${Icons.arrowLeft} Back</a>
          <h1>Verify OTP</h1>
          <p class="subtitle">Enter the 6-digit code sent to <strong style="color:var(--primary);">${state.emailForReset}</strong></p>
          <div class="otp-container" id="otpContainer"></div>
          <div class="error-message hidden" id="otpErr" style="justify-content:center;margin-bottom:0.5rem;"></div>
          <div class="countdown-area"><span class="countdown-text" id="countdownText">Resend in <span id="countdownSec">60</span>s</span><button class="resend-btn" id="resendBtn" onclick="handleResendOTP()" disabled>Resend OTP</button></div>
          <button class="btn btn-primary" id="verifyOtpBtn" disabled onclick="handleVerifyOTP()"><span id="verifyOtpText">Verify OTP</span><span id="verifyOtpSpin" class="hidden"><span class="btn-spinner"></span> Verifying...</span></button>
        </div>
      `;
      setTimeout(() => {
        const oc=document.getElementById('otpContainer');
        for(let i=0;i<6;i++){
          const inp=document.createElement('input');
          inp.type='text'; inp.inputMode='numeric'; inp.maxLength=1;
          inp.className='otp-box'; inp.id='otp-'+i;
          inp.addEventListener('input',e=>{const v=e.target.value.replace(/\D/g,'');if(v){state.otp[i]=v.slice(-1);e.target.value=v.slice(-1);e.target.classList.add('filled');if(i<5)document.getElementById('otp-'+(i+1)).focus();}else{state.otp[i]='';e.target.classList.remove('filled');}document.getElementById('verifyOtpBtn').disabled=!state.otp.every(o=>o);});
          inp.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!state.otp[i]&&i>0)document.getElementById('otp-'+(i-1)).focus();if(e.key==='ArrowLeft'&&
      inp.addEventListener('keydown',e=>{
            if(e.key==='Backspace'&&!state.otp[i]&&i>0) document.getElementById('otp-'+(i-1)).focus();
            if(e.key==='ArrowLeft'&&i>0) document.getElementById('otp-'+(i-1)).focus();
            if(e.key==='ArrowRight'&&i<5) document.getElementById('otp-'+(i+1)).focus();
          });
          inp.addEventListener('paste',e=>{
            if(i===0){
              e.preventDefault();
              const data=e.clipboardData.getData('text/plain').replace(/\D/g,'').slice(0,6);
              for(let j=0;j<6;j++){
                state.otp[j]=data[j]||'';
                const el=document.getElementById('otp-'+j);
                if(el){el.value=state.otp[j];if(state.otp[j])el.classList.add('filled');}
              }
              document.getElementById('verifyOtpBtn').disabled=!state.otp.every(o=>o);
            }
          });
          oc.appendChild(inp);
        }
        document.getElementById('otp-0').focus();
        startCountdown();
      }, 50);
      return d;
    }

    function startCountdown() {
      state.countdown=60;
      const sec=document.getElementById('countdownSec'), rb=document.getElementById('resendBtn');
      if(!sec||!rb) return;
      rb.disabled=true;
      if(state.countdownInt) clearInterval(state.countdownInt);
      state.countdownInt=setInterval(()=>{
        state.countdown--;
        sec.textContent=state.countdown;
        if(state.countdown<=0){
          clearInterval(state.countdownInt); state.countdownInt=null;
          rb.disabled=false;
          sec.parentElement.innerHTML='Didn\'t receive the code? ';
        }
      },1000);
    }

    window.handleResendOTP=function(){
      const otp=genOTP(); DB.otps=DB.otps.filter(o=>o.email!==state.emailForReset);
      DB.otps.push({email:state.emailForReset,otp,expiresAt:Date.now()+5*60*1000});
      state.otp=['','','','','',''];
      for(let i=0;i<6;i++){const el=document.getElementById('otp-'+i);if(el){el.value='';el.classList.remove('filled');}}
      document.getElementById('otp-0').focus();
      document.getElementById('verifyOtpBtn').disabled=true;
      console.log(`[DEV] New OTP: ${otp}`);
      Toast.show('New OTP sent!','success');
      startCountdown();
    };

    window.handleVerifyOTP=function(){
      const otpStr=state.otp.join('');
      if(otpStr.length!==6) return;
      const btn=document.getElementById('verifyOtpBtn'), txt=document.getElementById('verifyOtpText'), sp=document.getElementById('verifyOtpSpin');
      btn.disabled=true; txt.classList.add('hidden'); sp.classList.remove('hidden');
      setTimeout(()=>{
        const rec=DB.otps.find(o=>o.email===state.emailForReset&&o.otp===otpStr);
        if(!rec){Toast.show('Invalid OTP','error');document.getElementById('otpErr').textContent='Invalid OTP';document.getElementById('otpErr').classList.remove('hidden');btn.disabled=false;txt.classList.remove('hidden');sp.classList.add('hidden');return;}
        if(Date.now()>rec.expiresAt){Toast.show('OTP expired','error');document.getElementById('otpErr').textContent='OTP expired';document.getElementById('otpErr').classList.remove('hidden');btn.disabled=false;txt.classList.remove('hidden');sp.classList.add('hidden');return;}
        DB.otps=DB.otps.filter(o=>!(o.email===state.emailForReset&&o.otp===otpStr));
        state.otpVerified=true;
        Toast.show('OTP verified! 🐵','success');
        navigate('reset-password');
      },1000);
    };

    // --- RESET PASSWORD ---
    function renderResetPassword() {
      state.showPwd=false; state.showConfirmPwd=false;
      const d=document.createElement('div'); d.className='page';
      d.innerHTML=`
        <div class="auth-card">
          <a class="auth-link" onclick="navigate('verify-otp')" style="display:inline-flex;align-items:center;gap:0.35rem;font-size:0.85rem;margin-bottom:1rem;">${Icons.arrowLeft} Back</a>
          <h1>New Password</h1>
          <p class="subtitle">Choose a strong password</p>
          <form id="resetForm" onsubmit="handleReset(event)">
            <div class="input-group">
              <div class="input-wrapper" id="resetPwdWrap">
                <span class="input-icon">${Icons.lock}</span>
                <div class="floating-wrap"><input type="password" id="resetPwd" placeholder=" " autocomplete="new-password" oninput="onResetPwdChange()" /><label>New Password</label></div>
                <div class="input-actions"><button type="button" class="input-action-btn" onclick="toggleResetPwd()"><span id="resetPwdIcon">${Icons.eye}</span></button></div>
              </div>
              <div class="error-message hidden" id="resetPwdErr"></div>
              <div id="resetStrength"></div>
            </div>
            <div class="input-group">
              <div class="input-wrapper" id="resetConfirmWrap">
                <span class="input-icon">${Icons.lock}</span>
                <div class="floating-wrap"><input type="password" id="resetConfirm" placeholder=" " autocomplete="new-password" /><label>Confirm Password</label></div>
                <div class="input-actions"><button type="button" class="input-action-btn" onclick="toggleResetConfirm()"><span id="resetConfirmIcon">${Icons.eye}</span></button></div>
              </div>
              <div class="error-message hidden" id="resetConfirmErr"></div>
            </div>
            <button type="submit" class="btn btn-primary" id="resetBtn"><span id="resetBtnText">Reset Password</span><span id="resetBtnSpin" class="hidden"><span class="btn-spinner"></span> Resetting...</span></button>
          </form>
        </div>
      `;
      return d;
    }

    window.toggleResetPwd=function(){state.showPwd=!state.showPwd;const i=document.getElementById('resetPwd'),ic=document.getElementById('resetPwdIcon');if(i)i.type=state.showPwd?'text':'password';if(ic)ic.innerHTML=state.showPwd?Icons.eyeOff:Icons.eye;};
    window.toggleResetConfirm=function(){state.showConfirmPwd=!state.showConfirmPwd;const i=document.getElementById('resetConfirm'),ic=document.getElementById('resetConfirmIcon');if(i)i.type=state.showConfirmPwd?'text':'password';if(ic)ic.innerHTML=state.showConfirmPwd?Icons.eyeOff:Icons.eye;};

    window.onResetPwdChange=function(){
      const pwd=document.getElementById('resetPwd').value;
      const c=document.getElementById('resetStrength');
      if(!pwd){c.innerHTML='';return;}
      const s=V.strength(pwd);
      const bars=[1,2,3,4,5].map(l=>`<div class="strength-bar${s.score>=l*20?' active':''}" style="${s.score>=l*20?'--bar-color:'+s.color:''}"></div>`).join('');
      const reqs=V.reqs.map(r=>`<div class="req-item${r.test(pwd)?' met':''}">${r.test(pwd)?Icons.check:Icons.x} ${r.label}</div>`).join('');
      c.innerHTML=`<div class="strength-container"><div class="strength-bars">${bars}</div><p class="strength-label" style="color:${s.color}">${s.label}</p><div class="requirements-list">${reqs}</div></div>`;
    };

    window.handleReset=function(e){
      e.preventDefault();
      const pwd=document.getElementById('resetPwd').value, cf=document.getElementById('resetConfirm').value;
      let bad=false;
      const pe=V.password(pwd), ce=V.confirmPassword(pwd,cf);
      const pel=document.getElementById('resetPwdErr'), cel=document.getElementById('resetConfirmErr');
      const pwr=document.getElementById('resetPwdWrap'), cwr=document.getElementById('resetConfirmWrap');
      if(pe){pel.textContent=pe;pel.classList.remove('hidden');pwr.classList.add('error');bad=true;}else{pel.classList.add('hidden');pwr.classList.remove('error');}
      if(ce){cel.textContent=ce;cel.classList.remove('hidden');cwr.classList.add('error');bad=true;}else{cel.classList.add('hidden');cwr.classList.remove('error');}
      if(bad) return;
      const btn=document.getElementById('resetBtn'), txt=document.getElementById('resetBtnText'), sp=document.getElementById('resetBtnSpin');
      btn.disabled=true; txt.classList.add('hidden'); sp.classList.remove('hidden');
      setTimeout(()=>{
        const users=DB.users, idx=users.findIndex(u=>u.email===state.emailForReset);
        if(idx>=0){users[idx].password=pwd;DB.users=users;}
        Toast.show('Password reset successful! 🐵','success');
        navigate('reset-success');
      },1200);
    };

    function renderResetSuccess(){
      const d=document.createElement('div'); d.className='page';
      d.innerHTML=`<div class="auth-card" style="text-align:center;padding:3rem 2rem;"><div class="success-container"><div class="check-circle"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><h2 class="success-title">Password Reset! 🐵</h2><p class="success-subtitle">Your password has been reset. Sign in with your new password.</p></div><button class="btn btn-primary" onclick="navigate('login')" style="margin-top:1rem;">Sign In</button></div>`;
      return d;
    }

    function renderVerifyEmail(){
      const d=document.createElement('div'); d.className='page';
      d.innerHTML=`<div class="auth-card" style="text-align:center;padding:3rem 2rem;"><div style="margin-bottom:1.5rem;"><div style="width:64px;height:64px;border-radius:16px;background:rgba(255,107,0,0.1);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;border:1px solid rgba(255,107,0,0.2);"><svg style="width:32px;height:32px;color:var(--primary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/></svg></div><h1>Verify Your Email</h1><p class="subtitle">We sent a verification link to <strong style="color:var(--primary);">${state.email}</strong></p></div><div style="padding:1.25rem;background:rgba(255,107,0,0.04);border-radius:16px;border:1px solid rgba(255,107,0,0.1);margin-bottom:1.5rem;text-align:left;"><p style="font-size:0.85rem;color:var(--text-secondary);line-height:1.6;">Click the link in the email to activate your account. Check spam if you don't see it.</p></div><button class="btn btn-primary" onclick="handleResendVerification()" id="verifyEmailBtn"><span id="verifyEmailText">Resend Email</span><span id="verifyEmailSpin" class="hidden"><span class="btn-spinner"></span> Sending...</span></button><button class="btn btn-secondary" onclick="navigate('login')" style="margin-top:0.75rem;">Back to Sign In</button></div>`;
      return d;
    }

    window.handleResendVerification=function(){const btn=document.getElementById('verifyEmailBtn'),txt=document.getElementById('verifyEmailText'),sp=document.getElementById('verifyEmailSpin');btn.disabled=true;txt.classList.add('hidden');sp.classList.remove('hidden');setTimeout(()=>{Toast.show('Verification email resent! 🐵','success');btn.disabled=false;txt.classList.remove('hidden');sp.classList.add('hidden');},1200);};

    function renderDashboard(){
      const s=DB.session;
      const d=document.createElement('div'); d.className='page'; d.style.maxWidth='520px';
      const name=s?s.fullName:'User', email=s?s.email:'—';
      d.innerHTML=`<div class="auth-card" style="padding:2rem;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);"><div style="display:flex;align-items:center;gap:0.75rem;"><div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;font-size:1.5rem;">🐵</div><div><p style="font-weight:600;">${name}</p><p style="font-size:0.8rem;color:var(--text-secondary);">${email}</p></div></div><span style="padding:0.35rem 0.75rem;border-radius:20px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);font-size:0.75rem;color:var(--success);font-weight:500;">Verified</span></div><h2 style="font-size:1.2rem;margin-bottom:1.25rem;">Welcome to Monkey 🐵</h2><div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:2rem;"><div class="glass-light" style="padding:1.25rem;border-radius:16px;border:1px solid var(--border);"><p style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:0.35rem;">Status</p><p style="font-weight:600;color:var(--success);">Active</p></div><div class="glass-light" style="padding:1.25rem;border-radius:16px;border:1px solid var(--border);"><p style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:0.35rem;">Auth</p><p style="font-weight:600;">Email / Google</p></div><div class="glass-light" style="padding:1.25rem;border-radius:16px;border:1px solid var(--border);"><p style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:0.35rem;">Role</p><p style="font-weight:600;">User</p></div><div class="glass-light" style="padding:1.25rem;border-radius:16px;border:1px solid var(--border);"><p style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:0.35rem;">2FA</p><p style="font-weight:600;color:var(--warning);">Off</p></div></div><button class="btn btn-secondary" onclick="handleLogout()">Sign Out</button></div>`;
      return d;
    }

    window.handleLogout=function(){DB.session=null;state.email='';state.password='';state.fullName='';Toast.show('Signed out 🐵','info');navigate('welcome');};

    // ============================================================
    //  ROUTER + INIT
    // ============================================================
    function renderPage(page){
      switch(page){
        case 'welcome': return renderWelcome();
        case 'login': return renderLogin();
        case 'register': return renderRegister();
        case 'forgot-password': return renderForgotPassword();
        case 'verify-otp': return renderVerifyOTP();
        case 'reset-password': return renderResetPassword();
        case 'reset-success': return renderResetSuccess();
        case 'verify-email': return renderVerifyEmail();
        case 'dashboard': return renderDashboard();
        default: return renderWelcome();
      }
    }

    (function(){const s=DB.session;if(s)render('dashboard');else render('welcome');})();
  </script>
</body>
</html>
